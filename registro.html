<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Sistema de Biblioteca</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/biblion/assets/registro-CKocWp6o.js"></script>
  <link rel="modulepreload" crossorigin href="/biblion/assets/auth-Clpj9KIu.js">
  <link rel="modulepreload" crossorigin href="/biblion/assets/icons-BIAwcOnk.js">
  <link rel="stylesheet" crossorigin href="/biblion/assets/icons-mTz4k9HH.css">
</head>

<body class="flex items-center justify-center min-h-screen p-4">
  <div class="card w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-primary/10 text-primary rounded-full mb-4">
        <div data-heroicon="user" class="w-8 h-8"></div>
      </div>
      <h1 class="text-2xl font-bold">Criar nova conta</h1>
      <p class="text-text-secondary-light dark:text-text-secondary-dark">Cadastre-se para começar a usar o sistema</p>
    </div>

    <form id="registerForm" class="space-y-4">
      <div>
        <label for="nome" class="label-field">Nome Completo</label>
        <input type="text" id="nome" class="input-field" placeholder="João da Silva" required>
      </div>
      <div>
        <label for="email" class="label-field">E-mail</label>
        <input type="email" id="email" class="input-field" placeholder="seu@email.com" required>
      </div>
      <div>
        <label for="role" class="label-field">Tipo de Perfil</label>
        <select id="role" class="input-field">
          <option value="cliente">Cliente (Leitor)</option>
          <option value="proprietario">Proprietário (Admin)</option>
        </select>
      </div>
      <div>
        <label for="password" class="label-field">Senha</label>
        <input type="password" id="password" class="input-field" placeholder="••••••••" required minlength="6">
      </div>
      <button type="submit" id="registerBtn" class="btn-primary w-full py-3">
        Criar Conta
      </button>
    </form>

    <div class="mt-6 text-center">
      <p class="text-sm text-text-secondary-light dark:text-text-secondary-dark">
        Já tem uma conta?
        <a href="login.html" class="text-primary hover:underline font-medium">Faça login</a>
      </p>
    </div>
  </div>

</body>

</html>
